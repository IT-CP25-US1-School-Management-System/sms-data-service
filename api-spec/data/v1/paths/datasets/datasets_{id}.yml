# /datasets/{id}:
get:
  tags: [Catalog]
  summary: Get dataset detail
  parameters:
    - $ref: "../../components/parameters/DatasetId.yml"
  responses:
    "200":
      description: Dataset
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/DatasetDetail.yml"
    "204":
      description: No Content
    "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "../../components/schemas/ErrorResponse.yml"     
    "404":
        description: Not Found
        content:
          application/json:
            schema:
              $ref: "../../components/schemas/ErrorResponse.yml"
    "500":
        description: Internal Server Error
        content:
          application/json:
            schema:
              $ref: "../../components/schemas/ErrorResponse.yml"   
