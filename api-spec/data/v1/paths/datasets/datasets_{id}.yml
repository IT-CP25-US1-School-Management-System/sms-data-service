# /datasets/{id}:
get:
  tags: [Catalog]
  summary: Get dataset detail
  parameters:
    - $ref: "../../components/parameters/DatasetId.yml"
  responses:
    "200":
      description: Dataset
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/DatasetDetail.yml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
delete:
  tags: [Catalog]
  summary: Detlete dataset by id
  parameters:
    - $ref: "../../components/parameters/DatasetId.yml"
  responses:
    "200":
      description: Dataset
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Success.yml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
