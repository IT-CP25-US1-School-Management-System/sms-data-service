# /datasets:
get:
  tags: [Catalog]
  summary: Search datasets
  parameters:
    - $ref: "../../components/parameters/SearchWord.yml"
    - $ref: "../../components/parameters/Domain.yml"
    - $ref: "../../components/parameters/Tag.yml"
    - $ref: "../../components/parameters/HasPII.yml"
    - $ref: "../../components/parameters/Owner.yml"
    - $ref: "../../components/parameters/Page.yml"
    - $ref: "../../components/parameters/PageSize.yml"
    - $ref: "../../components/parameters/Sort.yml"
    - $ref: "../../components/parameters/SortOrder.yml"
  responses:
    "200":
      description: List of datasets
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "../../components/schemas/Dataset.yml"
              page:
                type: integer
              per_page:
                type: integer
              total_pages:
                type: integer
              total_rows:
                type: integer
    "400":
      description: BadRequest,
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "500":
      description: InternalServerError,
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"

post:
  tags: [Catalog]
  summary: New dataset and Update dataset
  requestBody:
    required: true
    description: dataset id must contain only lowercase english letters, underscore, and hyphen without spaces
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/DatasetUpsert.yml"
  responses:
    "200":
      description: Created
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Success.yml"
    "400":
      description: BadRequest,
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "500":
      description: InternalServerError,
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
