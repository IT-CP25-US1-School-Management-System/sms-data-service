# /datasets:
get:
  tags: [Catalog]
  summary: "EN: Search datasets / TH: ค้นหา dataset"
  parameters:
    - $ref: "../../components/parameters/SearchWord.yml"
    - $ref: "../../components/parameters/Domain.yml"
    - $ref: "../../components/parameters/Tag.yml"
    - $ref: "../../components/parameters/HasPII.yml"
    - $ref: "../../components/parameters/Owner.yml"
    - $ref: "../../components/parameters/Page.yml"
    - $ref: "../../components/parameters/PageSize.yml"
    - $ref: "../../components/parameters/Sort.yml"
    - $ref: "../../components/parameters/SortOrder.yml"
  responses:
    "200":
      description: "EN: List of datasets / TH: รายการ dataset"
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "../../components/schemas/Dataset.yml"
              page:
                type: integer
              per_page:
                type: integer
              total_pages:
                type: integer
              total_rows:
                type: integer
    "400":
      description: "EN: Bad request / TH: คำขอไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "500":
      description: "EN: Internal server error / TH: ระบบเกิดข้อผิดพลาด"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"

post:
  tags: [Catalog]
  summary: "EN: Create or update a dataset / TH: สร้างหรือแก้ไข dataset"
  requestBody:
    required: true
    description: "EN: Dataset ID must contain only lowercase English letters, underscore, and hyphen without spaces / TH: รหัส dataset ต้องมีเฉพาะตัวอักษรอังกฤษพิมพ์เล็ก underscore และ hyphen โดยไม่มีช่องว่าง"
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/DatasetUpsert.yml"
  responses:
    "200":
      description: "EN: Created or updated successfully / TH: สร้างหรือแก้ไขสำเร็จ"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Success.yml"
    "400":
      description: "EN: Bad request / TH: คำขอไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "500":
      description: "EN: Internal server error / TH: ระบบเกิดข้อผิดพลาด"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
