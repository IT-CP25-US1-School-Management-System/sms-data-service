# /introspect/sources
get:
  tags: [Introspection]
  summary: "EN: List registered physical sources / TH: ดูรายการแหล่งข้อมูลที่ลงทะเบียน"
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: "EN: Page number for pagination / TH: เลขหน้าสำหรับแบ่งหน้า"
    - name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: "EN: Number of items per page / TH: จำนวนรายการต่อหน้า"
  responses:
    "200":
      description: "EN: List of sources with pagination / TH: รายการแหล่งข้อมูลพร้อม pagination"
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "../../components/schemas/SourcesResponseDTO.yml"
              page:
                type: integer
              per_page:
                type: integer
              total_pages:
                type: integer
              total_rows:
                type: integer
    "400":
      description: "EN: Bad request / TH: คำขอไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "500":
      description: "EN: Internal server error / TH: ระบบเกิดข้อผิดพลาด"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"

post:
  tags: [Introspection]
  summary: "EN: Create a new data source / TH: สร้างแหล่งข้อมูลใหม่"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/SourcesDTO.yml"
  responses:
    "200":
      description: "EN: Source created successfully / TH: สร้างแหล่งข้อมูลสำเร็จ"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "success"
              id:
                type: string
                format: uuid
                description: "EN: Created source ID / TH: รหัสแหล่งข้อมูลที่สร้าง"
    "400":
      description: "EN: Bad request - validation error / TH: คำขอไม่ถูกต้อง - ข้อมูลไม่ผ่าน validation"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "409":
      description: "EN: Conflict - source already exists / TH: ข้อมูลซ้ำ - มีแหล่งข้อมูลนี้อยู่แล้ว"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "500":
      description: "EN: Internal server error / TH: ระบบเกิดข้อผิดพลาด"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
