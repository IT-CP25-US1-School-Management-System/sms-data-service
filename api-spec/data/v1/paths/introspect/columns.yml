# /introspect/columns
get:
  tags: [Introspection]
  summary: List columns for a table
  parameters:
    - name: source_id
      in: query
      schema:
        type: string
        format: uuid
      description: Filter by source ID
    - name: schema
      in: query
      schema:
        type: string
      description: Filter by schema name
    - name: table
      in: query
      schema:
        type: string
      description: Filter by table name
    - name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination
    - name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Number of items per page
  responses:
    "200":
      description: List of columns with pagination
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "../../components/schemas/Columns.yml"
              page:
                type: integer
              per_page:
                type: integer
              total_pages:
                type: integer
              total_rows:
                type: integer
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
