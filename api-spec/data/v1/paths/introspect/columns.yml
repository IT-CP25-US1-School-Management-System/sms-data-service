# /introspect/columns:
get:
  tags: [Introspection]
  summary: List columns for a table
  parameters:
    - name: source_id
      in: query
      schema:
        type: string
    - name: schema
      in: query
      schema:
        type: string
    - name: table
      in: query
      schema:
        type: string
  responses:
    "200":
      description: Columns
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "../../components/schemas/PhysicalColumn.yml"
              page:
                type: integer
              per_page:
                type: integer
              total_pages:
                type: integer
              total_rows:
                type: integer
