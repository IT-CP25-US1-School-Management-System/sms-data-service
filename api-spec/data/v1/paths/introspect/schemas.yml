# /introspect/schemas:
get:
  tags: [Introspection]
  summary: List schemas in a source
  parameters:
    - name: source_id
      in: query
      schema:
        type: string
  responses:
    "200":
      description: Schemas
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    sources_id:
                      type: string
                    schema:
                      type: string
                    created_at:
                      type: string
                      format: date-time
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
