# /introspect/schemas
get:
  tags: [Introspection]
  summary: "EN: List schemas in a source / TH: ดูรายการ schema ในแหล่งข้อมูล"
  parameters:
    - name: source_id
      in: query
      schema:
        type: string
        format: uuid
      description: "EN: Filter by source ID / TH: กรองด้วยรหัสแหล่งข้อมูล"
    - name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: "EN: Page number for pagination / TH: เลขหน้าสำหรับแบ่งหน้า"
    - name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: "EN: Number of items per page / TH: จำนวนรายการต่อหน้า"
  responses:
    "200":
      description: "EN: List of schemas with pagination / TH: รายการ schema พร้อม pagination"
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "../../components/schemas/Schemas.yml"
              page:
                type: integer
              per_page:
                type: integer
              total_pages:
                type: integer
              total_rows:
                type: integer
    "400":
      description: "EN: Bad request / TH: คำขอไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "500":
      description: "EN: Internal server error / TH: ระบบเกิดข้อผิดพลาด"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
