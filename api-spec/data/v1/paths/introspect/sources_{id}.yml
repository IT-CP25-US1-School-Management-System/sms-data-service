# /introspect/sources/{id}
get:
  tags: [Introspection]
  summary: "EN: Get a data source by ID / TH: ดูรายละเอียดแหล่งข้อมูลตาม ID"
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "EN: Source ID / TH: รหัสแหล่งข้อมูล"
  responses:
    "200":
      description: "EN: Source detail / TH: รายละเอียดแหล่งข้อมูล"
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "../../components/schemas/SourcesResponseDTO.yml"
    "400":
      description: "EN: Invalid source ID / TH: รหัสแหล่งข้อมูลไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Source not found / TH: ไม่พบแหล่งข้อมูล"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"

put:
  tags: [Introspection]
  summary: "EN: Update a data source / TH: แก้ไขแหล่งข้อมูล"
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "EN: Source ID / TH: รหัสแหล่งข้อมูล"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/UpdateSourcesDTO.yml"
  responses:
    "200":
      description: "EN: Source updated successfully / TH: แก้ไขแหล่งข้อมูลสำเร็จ"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: success
              id:
                type: string
                format: uuid
    "400":
      description: "EN: Validation error / TH: ข้อมูลไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Source not found / TH: ไม่พบแหล่งข้อมูล"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"

delete:
  tags: [Introspection]
  summary: "EN: Delete a data source / TH: ลบแหล่งข้อมูล"
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "EN: Source ID / TH: รหัสแหล่งข้อมูล"
  responses:
    "200":
      description: "EN: Source deleted successfully / TH: ลบแหล่งข้อมูลสำเร็จ"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: success
    "400":
      description: "EN: Invalid source ID / TH: รหัสแหล่งข้อมูลไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Source not found / TH: ไม่พบแหล่งข้อมูล"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
