# /introspect/tables:
get:
  tags: [Introspection]
  summary: List tables in a schema
  parameters:
    - name: source_id
      in: query
      schema:
        type: string
    - name: schema
      in: query
      schema:
        type: string
  responses:
    "200":
      description: Tables
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    sources_id:
                      type: string
                    schema:
                      type: string
                    table_name:
                      type: string
                    created_at:
                      type: string
                      format: date-time
              page:
                type: integer
              per_page:
                type: integer
              total_pages:
                type: integer
              total_rows:
                type: integer
