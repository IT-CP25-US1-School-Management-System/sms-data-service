# /reporting/export/job
post:
  tags: [Reporting]
  summary: "EN: Create dataset export job / TH: สร้างงาน export dataset"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/ExportJobCreate.yml"
  responses:
    "200":
      description: "EN: Export job created / TH: สร้างงาน export สำเร็จ"
      content:
        application/json:
          schema:
            type: object
            properties:
              job_id:
                type: string
                format: uuid
                description: "EN: Export job ID / TH: รหัสงาน export"
    "400":
      description: "EN: Validation error / TH: ข้อมูลไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
