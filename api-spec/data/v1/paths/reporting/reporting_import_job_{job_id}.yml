# /reporting/import/job/{job_id}
get:
  tags: [Reporting]
  summary: "EN: Get dataset import job by ID / TH: ดูข้อมูลงาน import dataset ตาม ID"
  parameters:
    - name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "EN: Import job ID / TH: รหัสงาน import"
  responses:
    "200":
      description: "EN: Import job detail / TH: รายละเอียดงาน import"
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "../../components/schemas/ImportJobStatus.yml"
    "400":
      description: "EN: Invalid job ID / TH: รหัสงานไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Import job not found / TH: ไม่พบงาน import"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
