# /reporting/import/job
post:
  tags: [Reporting]
  summary: "EN: Create dataset import job / TH: สร้างงาน import dataset"
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            file:
              type: string
              format: binary
              description: "EN: CSV/XLSX file to import / TH: ไฟล์ CSV/XLSX ที่ต้องการ import"
            dataset_id:
              type: string
              description: "EN: Dataset ID / TH: รหัส dataset"
            version:
              type: string
              description: "EN: Dataset version / TH: version ของ dataset"
            format:
              type: string
              enum: [csv, xlsx]
              description: "EN: File format / TH: รูปแบบไฟล์"
          required: [file, dataset_id, version, format]
  responses:
    "200":
      description: "EN: Import job created / TH: สร้างงาน import สำเร็จ"
      content:
        application/json:
          schema:
            type: object
            properties:
              job_id:
                type: string
                format: uuid
                description: "EN: Import job ID / TH: รหัสงาน import"
    "400":
      description: "EN: Bad request / TH: คำขอไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
