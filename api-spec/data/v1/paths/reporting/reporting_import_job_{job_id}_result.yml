get:
  tags: [Reporting]
  summary: Get the result of an export job
  parameters:
    - $ref: "../../components/parameters/JobId.yml"
  responses:
    "200":
      description: Job result
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ImportJobResult.yml"
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"