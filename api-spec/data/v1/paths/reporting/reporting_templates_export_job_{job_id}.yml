# /reporting/templates/export/job/{job_id}
get:
  tags: [Reporting]
  summary: "EN: Get PDF reporting export job by ID / TH: ดูข้อมูลงาน export PDF report ตาม ID"
  parameters:
    - name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "EN: Reporting export job ID / TH: รหัสงาน export report"
  responses:
    "200":
      description: "EN: Reporting export job detail / TH: รายละเอียดงาน export report"
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "../../components/schemas/ReportingExportJobStatus.yml"
    "400":
      description: "EN: Invalid job ID / TH: รหัสงานไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Reporting export job not found / TH: ไม่พบงาน export report"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
