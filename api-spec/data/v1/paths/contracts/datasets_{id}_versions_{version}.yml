# /datasets/{id}/versions/{version}
get:
  tags: [Contracts]
  summary: "EN: Get dataset version by ID (contract details) / TH: ดูรายละเอียด version ของ dataset ตาม ID"
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: "EN: Dataset ID / TH: รหัส dataset"
    - name: version
      in: path
      required: true
      schema:
        type: string
      description: "EN: Version name/number / TH: ชื่อหรือเลข version"
  responses:
    "200":
      description: "EN: Dataset version details / TH: รายละเอียด version ของ dataset"
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "../../components/schemas/DatasetVersion.yml"
    "400":
      description: "EN: Bad request / TH: คำขอไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Dataset or version not found / TH: ไม่พบ dataset หรือ version"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"

put:
  tags: [Contracts]
  summary: "EN: Update dataset version (contract) / TH: แก้ไข version ของ dataset (contract)"
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: "EN: Dataset ID / TH: รหัส dataset"
    - name: version
      in: path
      required: true
      schema:
        type: string
      description: "EN: Version name/number / TH: ชื่อหรือเลข version"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/UpdateDatasetVersionDTO.yml"
  responses:
    "200":
      description: "EN: Dataset version updated successfully / TH: แก้ไข version ของ dataset สำเร็จ"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "success"
    "400":
      description: "EN: Bad request - validation error / TH: คำขอไม่ถูกต้อง - ข้อมูลไม่ผ่าน validation"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Dataset or version not found / TH: ไม่พบ dataset หรือ version"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"

patch:
  tags: [Contracts]
  summary: "EN: Update dataset version status / TH: แก้ไขสถานะ version ของ dataset"
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: "EN: Dataset ID / TH: รหัส dataset"
    - name: version
      in: path
      required: true
      schema:
        type: string
      description: "EN: Version name/number / TH: ชื่อหรือเลข version"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/UpdateDatasetVersionStatusDTO.yml"
  responses:
    "200":
      description: "EN: Dataset version status updated successfully / TH: แก้ไขสถานะ version ของ dataset สำเร็จ"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "success"
    "400":
      description: "EN: Bad request - validation error / TH: คำขอไม่ถูกต้อง - ข้อมูลไม่ผ่าน validation"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Dataset or version not found / TH: ไม่พบ dataset หรือ version"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
