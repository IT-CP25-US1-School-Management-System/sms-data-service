get:
  tags:
    - Contracts
  summary: Read a specific data contract version
  parameters:
    - $ref: "../../components/parameters/DatasetPath.yml"
    - name: versions
      in: path
      required: true
      schema:
        type: string
  responses:
    "200":
      description: Contract
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/Contract.yml"
    "404":
      description: Not found
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"