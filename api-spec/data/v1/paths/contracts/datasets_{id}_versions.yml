# /datasets/{id}/versions
get:
  tags: [Contracts]
  summary: "EN: Get list of dataset versions (contracts) / TH: ดูรายการ version ของ dataset (contract)"
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: "EN: Dataset ID / TH: รหัส dataset"
    - name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: "EN: Page number for pagination / TH: เลขหน้าสำหรับแบ่งหน้า"
    - name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: "EN: Number of items per page / TH: จำนวนรายการต่อหน้า"
    - name: source_id
      in: query
      schema:
        type: string
        format: uuid
      description: "EN: Filter by source ID / TH: กรองด้วยรหัสแหล่งข้อมูล"
    - name: search_word
      in: query
      schema:
        type: string
      description: "EN: Search term / TH: คำค้นหา"
    - name: status
      in: query
      schema:
        type: string
        enum: [active, preview, deprecated]
      description: "EN: Filter by status / TH: กรองด้วยสถานะ"
  responses:
    "200":
      description: "EN: List of dataset versions with pagination / TH: รายการ version ของ dataset พร้อม pagination"
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "../../components/schemas/DatasetVersion.yml"
              page:
                type: integer
              per_page:
                type: integer
              total_pages:
                type: integer
              total_rows:
                type: integer
    "400":
      description: "EN: Bad request / TH: คำขอไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Dataset not found / TH: ไม่พบ dataset"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"

post:
  tags: [Contracts]
  summary: "EN: Create a new dataset version (contract) / TH: สร้าง version ใหม่ของ dataset (contract)"
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: "EN: Dataset ID / TH: รหัส dataset"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/InsertDatasetVersionDTO.yml"
  responses:
    "200":
      description: "EN: Dataset version created successfully / TH: สร้าง version ของ dataset สำเร็จ"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "success"
    "400":
      description: "EN: Bad request - validation error / TH: คำขอไม่ถูกต้อง - ข้อมูลไม่ผ่าน validation"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Dataset not found / TH: ไม่พบ dataset"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "409":
      description: "EN: Version already exists / TH: มี version นี้อยู่แล้ว"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
