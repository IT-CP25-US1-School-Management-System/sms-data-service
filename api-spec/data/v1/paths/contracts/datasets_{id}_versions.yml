# /datasets/{id}/versions
get:
  tags: [Contracts]
  summary: Get list of dataset versions (contracts)
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: Dataset ID
    - name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination
    - name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Number of items per page
    - name: source_id
      in: query
      schema:
        type: string
        format: uuid
      description: Filter by source ID
    - name: search_word
      in: query
      schema:
        type: string
      description: Search term
    - name: status
      in: query
      schema:
        type: string
        enum: [active, preview, deprecated]
      description: Filter by status
  responses:
    "200":
      description: List of dataset versions with pagination
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "../../components/schemas/DatasetVersion.yml"
              page:
                type: integer
              per_page:
                type: integer
              total_pages:
                type: integer
              total_rows:
                type: integer
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: Dataset not found
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"

post:
  tags: [Contracts]
  summary: Create a new dataset version (contract)
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: Dataset ID
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/InsertDatasetVersionDTO.yml"
  responses:
    "200":
      description: Dataset version created successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "success"
    "400":
      description: Bad Request - validation error
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: Dataset not found
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "409":
      description: Version already exists
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
