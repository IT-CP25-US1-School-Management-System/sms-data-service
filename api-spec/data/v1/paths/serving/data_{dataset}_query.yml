post:
  tags: [Serving]
  summary: Query data
  parameters:
    - $ref: "../../components/parameters/XDataPurpose.yml"
    - $ref: "../../components/parameters/DatasetPath.yml"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/QueryRequest.yml"
  responses:
    "200":
      description: Result set,
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/QueryResponse.yml"
    "400":
      description: BadRequest,
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
