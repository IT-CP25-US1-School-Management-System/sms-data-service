# /datasets/{id}/versions/{version}/data/key/{key}
get:
  tags: [Serving]
  summary: "EN: Get a row by key from dataset version (policy-aware) / TH: ดึงข้อมูลแถวด้วย key จาก version ของ dataset ตาม policy"
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: "EN: Dataset ID / TH: รหัส dataset"
    - name: version
      in: path
      required: true
      schema:
        type: string
      description: "EN: Dataset version / TH: version ของ dataset"
    - name: key
      in: path
      required: true
      schema:
        type: string
      description: "EN: Row key / TH: key ของแถวข้อมูล"
    - name: view
      in: query
      schema:
        type: string
      description: "EN: View name to use for data access / TH: ชื่อ view ที่ใช้เข้าถึงข้อมูล"
  responses:
    "200":
      description: "EN: Row data / TH: ข้อมูลแถว"
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                additionalProperties: true
    "400":
      description: "EN: Bad request / TH: คำขอไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "401":
      description: "EN: Unauthorized / TH: ไม่ได้รับอนุญาต"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "403":
      description: "EN: Forbidden / TH: ไม่มีสิทธิ์เข้าถึง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Row, dataset, or version not found / TH: ไม่พบข้อมูลแถว dataset หรือ version"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"

put:
  tags: [Serving]
  summary: "EN: Update a row by key (replace all fields) / TH: แก้ไขข้อมูลแถวด้วย key"
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: "EN: Dataset ID / TH: รหัส dataset"
    - name: version
      in: path
      required: true
      schema:
        type: string
      description: "EN: Dataset version / TH: version ของ dataset"
    - name: key
      in: path
      required: true
      schema:
        type: string
      description: "EN: Row key / TH: key ของแถวข้อมูล"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: true
          description: "EN: Complete row data for replacement / TH: ข้อมูลแถวทั้งหมดสำหรับแทนที่"
  responses:
    "200":
      description: "EN: Row updated successfully / TH: แก้ไขข้อมูลสำเร็จ"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "success"
              data:
                type: object
                additionalProperties: true
    "400":
      description: "EN: Bad request / TH: คำขอไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "401":
      description: "EN: Unauthorized / TH: ไม่ได้รับอนุญาต"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "403":
      description: "EN: Forbidden / TH: ไม่มีสิทธิ์เข้าถึง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Row, dataset, or version not found / TH: ไม่พบข้อมูลแถว dataset หรือ version"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"

delete:
  tags: [Serving]
  summary: "EN: Delete a row by key (soft delete) / TH: ลบข้อมูลแถวด้วย key"
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: "EN: Dataset ID / TH: รหัส dataset"
    - name: version
      in: path
      required: true
      schema:
        type: string
      description: "EN: Dataset version / TH: version ของ dataset"
    - name: key
      in: path
      required: true
      schema:
        type: string
      description: "EN: Row key / TH: key ของแถวข้อมูล"
  responses:
    "200":
      description: "EN: Row deleted successfully / TH: ลบข้อมูลสำเร็จ"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "success"
    "400":
      description: "EN: Bad request / TH: คำขอไม่ถูกต้อง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "401":
      description: "EN: Unauthorized / TH: ไม่ได้รับอนุญาต"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "403":
      description: "EN: Forbidden / TH: ไม่มีสิทธิ์เข้าถึง"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
    "404":
      description: "EN: Row, dataset, or version not found / TH: ไม่พบข้อมูลแถว dataset หรือ version"
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/ErrorResponse.yml"
