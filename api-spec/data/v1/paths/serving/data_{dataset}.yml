# /data/{dataset}:
get:
  tags: [Serving]
  summary: List rows from a dataset (policy-aware, dynamic)
  parameters:
    - $ref: "../../components/parameters/DatasetPath.yml"
    - $ref: "../../components/parameters/XDataPurpose.yml"
    - name: view
      in: query
      schema:
        type: string
    - name: columns
      in: query
      schema:
        type: string
        description: comma-separated allowlisted columns
    - name: filter
      in: query
      schema:
        type: string
        description: key:value on allowlisted filter keys
    - name: order_by
      in: query
      schema:
        type: string
        description: allowlisted column name with optional '-' prefix
    - $ref: "../../components/parameters/Limit.yml"
  responses:
    "200":
      description: Rows
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/RowsResponse.yml"
    "400": 
          description: BadRequest,
          content:
            application/json:
              schema:
                $ref: "../../components/schemas/ErrorResponse.yml"
    "401":
          description: Unauthorized,
          content:
            application/json:
              schema:
                $ref: "../../components/schemas/ErrorResponse.yml"    
    "403":
          description: Forbidden,
          content:
            application/json:
              schema:
                $ref: "../../components/schemas/ErrorResponse.yml"        

post:
  tags: [Serving]
  summary: Create a row
  parameters:
    - $ref: "../../components/parameters/DatasetPath.yml"
    - $ref: "../../components/parameters/XDataPurpose.yml"
    - $ref: "../../components/parameters/IdempotencyKey.yml"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: true
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/CreateResult.yml"
    "400": 
          description: BadRequest,
          content:
            application/json:
              schema:
                $ref: "../../components/schemas/ErrorResponse.yml"
    "409":
          description: Conflict,
          content:
            application/json:
              schema:
                $ref: "../../components/schemas/ErrorResponse.yml"