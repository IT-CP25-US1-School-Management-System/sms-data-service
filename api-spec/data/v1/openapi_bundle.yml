components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SourcesResponseDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Source ID
        name:
          type: string
          description: Source name
        description:
          type: string
          nullable: true
          description: Source description
        type:
          type: string
          description: Source type
        is_active:
          type: boolean
          description: Whether the source is active
        sensitivity:
          type: string
          description: Data sensitivity level
        db_type:
          type: string
          description: Database type
        host:
          type: string
          description: Database host
        port:
          type: integer
          description: Database port
        username:
          type: string
          description: Database username
        database_name:
          type: string
          description: Database name
        params:
          type: string
          nullable: true
          description: Additional connection parameters
        created_at:
          type: string
          format: date-time
          nullable: true
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Last update timestamp
      required:
        - name
        - type
        - is_active
        - sensitivity
        - db_type
        - host
        - port
        - username
        - database_name
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code
            message:
              type: string
              description: Error message
            details:
              type: object
              additionalProperties: true
              description: Additional error details
      required:
        - error
    SourcesDTO:
      type: object
      properties:
        name:
          type: string
          description: Source name
        description:
          type: string
          nullable: true
          description: Source description (optional)
        type:
          type: string
          enum:
            - jdbc
          description: Source type
        is_active:
          type: boolean
          description: Whether the source is active
        sensitivity:
          type: string
          enum:
            - public
            - internal
            - confidential
            - restricted
          description: Data sensitivity level
        db_type:
          type: string
          enum:
            - postgres
            - mysql
          description: Database type
        host:
          type: string
          description: Database host
        port:
          type: integer
          minimum: 1
          description: Database port
        username:
          type: string
          description: Database username
        password:
          type: string
          description: Database password
        database_name:
          type: string
          description: Database name
        params:
          type: string
          nullable: true
          description: Additional connection parameters (optional)
      required:
        - name
        - type
        - is_active
        - sensitivity
        - db_type
        - host
        - port
        - username
        - password
        - database_name
    UpdateSourcesDTO:
      type: object
      properties:
        name:
          type: string
          description: Source name (optional)
        description:
          type: string
          nullable: true
          description: Source description (optional)
        type:
          type: string
          enum:
            - jdbc
          description: Source type (optional)
        is_active:
          type: boolean
          description: Whether the source is active (optional)
        sensitivity:
          type: string
          enum:
            - public
            - internal
            - confidential
            - restricted
          description: Data sensitivity level (optional)
        db_type:
          type: string
          enum:
            - postgres
            - mysql
          description: Database type (optional)
        host:
          type: string
          description: Database host (optional)
        port:
          type: integer
          minimum: 1
          description: Database port (optional)
        username:
          type: string
          description: Database username (optional)
        database_name:
          type: string
          description: Database name (optional)
        params:
          type: string
          nullable: true
          description: Additional connection parameters (optional)
        is_update_password:
          type: boolean
          description: Whether to update the password (optional)
        password:
          type: string
          description: Database password (optional, required if is_update_password is true)
    Schemas:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Schema ID
        sources_id:
          type: string
          format: uuid
          nullable: true
          description: Source ID
        schema:
          type: string
          description: Schema name
        created_at:
          type: string
          format: date-time
          nullable: true
          description: Creation timestamp
      required:
        - schema
    Tables:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Table ID
        sources_id:
          type: string
          format: uuid
          nullable: true
          description: Source ID
        schema:
          type: string
          description: Schema name
        table_name:
          type: string
          description: Table name
        created_at:
          type: string
          format: date-time
          nullable: true
          description: Creation timestamp
      required:
        - schema
        - table_name
    Columns:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: Column ID
        sources_id:
          type: string
          format: uuid
          nullable: true
          description: Source ID
        schema:
          type: string
          description: Schema name
        table_name:
          type: string
          description: Table name
        column_name:
          type: string
          description: Column name
        data_type:
          type: string
          description: Data type
        is_nullable:
          type: boolean
          description: Whether the column is nullable
        column_default:
          type: string
          nullable: true
          description: Default value
        ordinal_position:
          type: integer
          nullable: true
          description: Column position in table
        created_at:
          type: string
          format: date-time
          nullable: true
          description: Creation timestamp
      required:
        - schema
        - table_name
        - column_name
        - data_type
        - is_nullable
    Dataset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          type: string
        owner:
          type: string
        sensitivity:
          type: string
          enum:
            - public
            - internal
            - confidential
            - restricted
        has_pii:
          type: boolean
        latest_version:
          type: string
        tags:
          type: array
          items:
            type: string
        description:
          type: string
    DatasetUpsert:
      type: object
      required:
        - id
        - name
        - domain
        - owner
        - sensitivity
        - has_pii
        - tags
        - description
      properties:
        id:
          type: string
          example: mydata
        name:
          type: string
        domain:
          type: string
        owner:
          type: string
        sensitivity:
          type: string
        has_pii:
          type: boolean
        tags:
          type: array
          items:
            type: string
        description:
          type: string
    Success:
      type: object
      properties:
        message:
          type: string
          example: success
    DatasetDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          type: string
        owner:
          type: string
        sensitivity:
          type: string
          enum:
            - public
            - internal
            - confidential
            - restricted
        has_pii:
          type: boolean
        latest_version:
          type: string
        tags:
          type: array
          items:
            type: string
        description:
          type: string
    Schema:
      type: object
      properties:
        columns:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: Column name
              table_name:
                type: string
                description: Table name
              alias:
                type: string
                description: Column alias (optional)
              type:
                type: string
                description: Data type
              is_nullable:
                type: boolean
                description: Whether the column is nullable
              default:
                type: string
                nullable: true
                description: Default value (optional)
              enum:
                type: array
                items:
                  type: string
                description: Enum values (optional)
            required:
              - name
              - table_name
              - type
          minItems: 1
          description: Column definitions
      required:
        - columns
    AccessPolicy:
      type: object
      properties:
        role:
          type: string
          description: User role
        scope:
          type: string
          description: Access scope
        can_view:
          type: boolean
          description: View permission
        can_edit:
          type: boolean
          description: Edit permission
        can_delete:
          type: boolean
          description: Delete permission
        allow_view:
          type: array
          items:
            type: string
          minItems: 1
          description: Allowed views/columns
      required:
        - role
        - scope
        - allow_view
    FromRef:
      type: object
      required:
        - source
        - schema
        - table
      properties:
        source:
          type: string
        schema:
          type: string
        table:
          type: string
        alias:
          type: string
    Expr:
      type: object
      description: Column reference or function call
      properties:
        col:
          type: string
          description: alias.column
        func:
          type: string
          enum:
            - max
            - min
            - sum
            - avg
            - count
            - coalesce
            - upper
            - lower
            - date_trunc
        args:
          type: array
          items:
            $ref: '#/components/schemas/Expr'
    BoolExpr:
      type: object
      description: Boolean expression for joins/where (eq/and/or only)
      properties:
        eq:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: '#/components/schemas/Expr'
        and:
          type: array
          items:
            $ref: '#/components/schemas/BoolExpr'
        or:
          type: array
          items:
            $ref: '#/components/schemas/BoolExpr'
    JoinRef:
      type: object
      required:
        - type
        - source
        - schema
        - table
        - 'on'
      properties:
        type:
          type: string
          enum:
            - inner
            - left
        source:
          type: string
        schema:
          type: string
        table:
          type: string
        alias:
          type: string
        'on':
          $ref: '#/components/schemas/BoolExpr'
    Projection:
      type: object
      required:
        - as
        - expr
      properties:
        as:
          type: string
        expr:
          $ref: '#/components/schemas/Expr'
        type:
          type: string
        nullable:
          type: boolean
    WhereAllow:
      type: object
      required:
        - key
        - expr
      properties:
        key:
          type: string
        expr:
          $ref: '#/components/schemas/Expr'
        ops:
          type: array
          items:
            type: string
            enum:
              - '='
              - IN
              - '>'
              - <
              - '>='
              - <=
    OrderAllow:
      type: object
      properties:
        col:
          type: string
    QueryPlan:
      type: object
      properties:
        from:
          $ref: '#/components/schemas/FromRef'
        joins:
          type: array
          items:
            $ref: '#/components/schemas/JoinRef'
        projections:
          type: array
          items:
            $ref: '#/components/schemas/Projection'
        group_by:
          type: array
          items:
            $ref: '#/components/schemas/Expr'
        where_allow:
          type: array
          items:
            $ref: '#/components/schemas/WhereAllow'
        order_allow:
          type: array
          items:
            $ref: '#/components/schemas/OrderAllow'
        limit_default:
          type: integer
          minimum: 1
    Policies:
      type: object
      properties:
        runtime:
          type: object
          properties:
            default_view:
              type: string
              description: Default view name
            key_field:
              type: string
              description: Primary key field
            query:
              $ref: '#/components/schemas/QueryPlan'
          required:
            - default_view
            - key_field
            - query
        views:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              properties:
                table_name:
