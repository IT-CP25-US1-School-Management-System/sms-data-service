openapi: 3.0.3
info:
  title: Data Management Service (DMS) API - v1
  version: 1.0.0
  description: |
    EN: Central DMS API for source introspection, dataset catalog, dataset version contracts,
    serving dynamic dataset data, direct table data CRUD, and reporting import/export jobs.

    TH: API กลางของ DMS สำหรับตรวจสอบแหล่งข้อมูล, จัดการ catalog ของ dataset,
    จัดการ contract/version ของ dataset, ให้บริการข้อมูลแบบ dynamic, CRUD ข้อมูลตารางโดยตรง,
    และงาน import/export report.
servers:
  - url: https://dms.company.com/api/v1
    description: 'EN: Production / TH: สภาพแวดล้อม production'
  - url: http://localhost:3200/api/v1
    description: 'EN: Local Dev / TH: สภาพแวดล้อมพัฒนาในเครื่อง'
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Introspection
  - name: Catalog
  - name: Contracts
  - name: Serving
  - name: Reporting
paths:
  /health-check:
    get:
      tags:
        - Health
      summary: 'EN: Health probe / TH: ตรวจสอบสถานะระบบ'
      responses:
        '200':
          description: 'EN: OK / TH: ระบบพร้อมใช้งาน'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /introspect/sources:
    get:
      tags:
        - Introspection
      summary: 'EN: List registered physical sources / TH: ดูรายการแหล่งข้อมูลที่ลงทะเบียน'
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 'EN: Page number for pagination / TH: เลขหน้าสำหรับแบ่งหน้า'
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: 'EN: Number of items per page / TH: จำนวนรายการต่อหน้า'
      responses:
        '200':
          description: 'EN: List of sources with pagination / TH: รายการแหล่งข้อมูลพร้อม pagination'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SourcesResponseDTO'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: 'EN: Bad request / TH: คำขอไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 'EN: Internal server error / TH: ระบบเกิดข้อผิดพลาด'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Introspection
      summary: 'EN: Create a new data source / TH: สร้างแหล่งข้อมูลใหม่'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourcesDTO'
      responses:
        '200':
          description: 'EN: Source created successfully / TH: สร้างแหล่งข้อมูลสำเร็จ'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
                  id:
                    type: string
                    format: uuid
                    description: 'EN: Created source ID / TH: รหัสแหล่งข้อมูลที่สร้าง'
        '400':
          description: 'EN: Bad request - validation error / TH: คำขอไม่ถูกต้อง - ข้อมูลไม่ผ่าน validation'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 'EN: Conflict - source already exists / TH: ข้อมูลซ้ำ - มีแหล่งข้อมูลนี้อยู่แล้ว'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 'EN: Internal server error / TH: ระบบเกิดข้อผิดพลาด'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/sources/{id}:
    get:
      tags:
        - Introspection
      summary: 'EN: Get a data source by ID / TH: ดูรายละเอียดแหล่งข้อมูลตาม ID'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 'EN: Source ID / TH: รหัสแหล่งข้อมูล'
      responses:
        '200':
          description: 'EN: Source detail / TH: รายละเอียดแหล่งข้อมูล'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SourcesResponseDTO'
        '400':
          description: 'EN: Invalid source ID / TH: รหัสแหล่งข้อมูลไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 'EN: Source not found / TH: ไม่พบแหล่งข้อมูล'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Introspection
      summary: 'EN: Update a data source / TH: แก้ไขแหล่งข้อมูล'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 'EN: Source ID / TH: รหัสแหล่งข้อมูล'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSourcesDTO'
      responses:
        '200':
          description: 'EN: Source updated successfully / TH: แก้ไขแหล่งข้อมูลสำเร็จ'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
                  id:
                    type: string
                    format: uuid
        '400':
          description: 'EN: Validation error / TH: ข้อมูลไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 'EN: Source not found / TH: ไม่พบแหล่งข้อมูล'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Introspection
      summary: 'EN: Delete a data source / TH: ลบแหล่งข้อมูล'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 'EN: Source ID / TH: รหัสแหล่งข้อมูล'
      responses:
        '200':
          description: 'EN: Source deleted successfully / TH: ลบแหล่งข้อมูลสำเร็จ'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
        '400':
          description: 'EN: Invalid source ID / TH: รหัสแหล่งข้อมูลไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 'EN: Source not found / TH: ไม่พบแหล่งข้อมูล'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/sources/{id}/activate:
    patch:
      tags:
        - Introspection
      summary: 'EN: Activate a data source / TH: เปิดใช้งานแหล่งข้อมูล'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 'EN: Source ID / TH: รหัสแหล่งข้อมูล'
      responses:
        '200':
          description: 'EN: Source activated successfully / TH: เปิดใช้งานแหล่งข้อมูลสำเร็จ'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
        '400':
          description: 'EN: Invalid source ID / TH: รหัสแหล่งข้อมูลไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 'EN: Source not found / TH: ไม่พบแหล่งข้อมูล'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/sources/{id}/deactivate:
    patch:
      tags:
        - Introspection
      summary: 'EN: Deactivate a data source / TH: ปิดใช้งานแหล่งข้อมูล'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 'EN: Source ID / TH: รหัสแหล่งข้อมูล'
      responses:
        '200':
          description: 'EN: Source deactivated successfully / TH: ปิดใช้งานแหล่งข้อมูลสำเร็จ'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
        '400':
          description: 'EN: Invalid source ID / TH: รหัสแหล่งข้อมูลไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 'EN: Source not found / TH: ไม่พบแหล่งข้อมูล'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/schemas:
    get:
      tags:
        - Introspection
      summary: 'EN: List schemas in a source / TH: ดูรายการ schema ในแหล่งข้อมูล'
      parameters:
        - name: source_id
          in: query
          schema:
            type: string
            format: uuid
          description: 'EN: Filter by source ID / TH: กรองด้วยรหัสแหล่งข้อมูล'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 'EN: Page number for pagination / TH: เลขหน้าสำหรับแบ่งหน้า'
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: 'EN: Number of items per page / TH: จำนวนรายการต่อหน้า'
      responses:
        '200':
          description: 'EN: List of schemas with pagination / TH: รายการ schema พร้อม pagination'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Schemas'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: 'EN: Bad request / TH: คำขอไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 'EN: Internal server error / TH: ระบบเกิดข้อผิดพลาด'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/tables:
    get:
      tags:
        - Introspection
      summary: 'EN: List tables in a schema / TH: ดูรายการตารางใน schema'
      parameters:
        - name: source_id
          in: query
          schema:
            type: string
            format: uuid
          description: 'EN: Filter by source ID / TH: กรองด้วยรหัสแหล่งข้อมูล'
        - name: schema
          in: query
          schema:
            type: string
          description: 'EN: Filter by schema name / TH: กรองด้วยชื่อ schema'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 'EN: Page number for pagination / TH: เลขหน้าสำหรับแบ่งหน้า'
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: 'EN: Number of items per page / TH: จำนวนรายการต่อหน้า'
      responses:
        '200':
          description: 'EN: List of tables with pagination / TH: รายการตารางพร้อม pagination'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tables'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: 'EN: Bad request / TH: คำขอไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 'EN: Internal server error / TH: ระบบเกิดข้อผิดพลาด'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/columns:
    get:
      tags:
        - Introspection
      summary: 'EN: List columns for a table / TH: ดูรายการคอลัมน์ของตาราง'
      parameters:
        - name: source_id
          in: query
          schema:
            type: string
            format: uuid
          description: 'EN: Filter by source ID / TH: กรองด้วยรหัสแหล่งข้อมูล'
        - name: schema
          in: query
          schema:
            type: string
          description: 'EN: Filter by schema name / TH: กรองด้วยชื่อ schema'
        - name: table
          in: query
          schema:
            type: string
          description: 'EN: Filter by table name / TH: กรองด้วยชื่อตาราง'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 'EN: Page number for pagination / TH: เลขหน้าสำหรับแบ่งหน้า'
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: 'EN: Number of items per page / TH: จำนวนรายการต่อหน้า'
      responses:
        '200':
          description: 'EN: List of columns with pagination / TH: รายการคอลัมน์พร้อม pagination'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Columns'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: 'EN: Bad request / TH: คำขอไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 'EN: Internal server error / TH: ระบบเกิดข้อผิดพลาด'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/sources/{id}/schemas/{schema}/tables/{table}/data:
    get:
      tags:
        - Introspection
      summary: 'EN: List rows from a physical table / TH: ดึงรายการข้อมูลจากตารางจริง'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 'EN: Source ID / TH: รหัสแหล่งข้อมูล'
        - name: schema
          in: path
          required: true
          schema:
            type: string
          description: 'EN: Schema name / TH: ชื่อ schema'
        - name: table
          in: path
          required: true
          schema:
            type: string
          description: 'EN: Table name / TH: ชื่อตาราง'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 'EN: Page number / TH: เลขหน้า'
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: 'EN: Items per page / TH: จำนวนรายการต่อหน้า'
        - name: where
          in: query
          schema:
            type: string
          description: 'EN: JSON filter groups / TH: เงื่อนไขกรองแบบ JSON'
        - name: where_logical_operator
          in: query
          schema:
            type: string
            enum:
              - AND
              - OR
              - and
              - or
          description: 'EN: Logical operator between filter groups / TH: ตัวเชื่อมเงื่อนไขระหว่างกลุ่ม'
        - name: sort_by
          in: query
          schema:
            type: string
          description: 'EN: Column to sort by / TH: คอลัมน์ที่ใช้เรียงลำดับ'
        - name: sort_order
          in: query
          schema:
            type: string
            enum:
              - ASC
              - DESC
              - asc
              - desc
          description: 'EN: Sort order / TH: ทิศทางการเรียงลำดับ'
      responses:
        '200':
          description: 'EN: Table rows with pagination / TH: ข้อมูลตารางพร้อม pagination'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: 'EN: Bad request / TH: คำขอไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 'EN: Source, schema, or table not found / TH: ไม่พบแหล่งข้อมูล, schema, หรือตาราง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Introspection
      summary: 'EN: Create a row in a physical table / TH: เพิ่มข้อมูลในตารางจริง'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 'EN: Source ID / TH: รหัสแหล่งข้อมูล'
        - name: schema
          in: path
          required: true
          schema:
            type: string
          description: 'EN: Schema name / TH: ชื่อ schema'
        - name: table
          in: path
          required: true
          schema:
            type: string
          description: 'EN: Table name / TH: ชื่อตาราง'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: 'EN: Row data / TH: ข้อมูลแถวที่ต้องการเพิ่ม'
      responses:
        '201':
          description: 'EN: Row created successfully / TH: เพิ่มข้อมูลสำเร็จ'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    additionalProperties: true
        '400':
          description: 'EN: Bad request / TH: คำขอไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/sources/{id}/schemas/{schema}/tables/{table}/data/key/{key}:
    get:
      tags:
        - Introspection
      summary: 'EN: Get a physical table row by key / TH: ดึงข้อมูลแถวจากตารางจริงด้วย key'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 'EN: Source ID / TH: รหัสแหล่งข้อมูล'
        - name: schema
          in: path
          required: true
          schema:
            type: string
          description: 'EN: Schema name / TH: ชื่อ schema'
        - name: table
          in: path
          required: true
          schema:
            type: string
          description: 'EN: Table name / TH: ชื่อตาราง'
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: 'EN: Row key value / TH: ค่า key ของแถว'
        - name: key_field
          in: query
          schema:
            type: string
            default: id
          description: 'EN: Column used as key / TH: คอลัมน์ที่ใช้เป็น key'
      responses:
        '200':
          description: 'EN: Row data / TH: ข้อมูลแถว'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        '400':
          description: 'EN: Bad request / TH: คำขอไม่ถูกต้อง'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 'EN: Row not found / TH: ไม่พบข้อมูล'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Introspection
      summary: 'EN: Update a physical table row by key / TH: แก้ไขข้อมูลแถวในตารางจริงด้วย key'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 'EN: Source ID / TH: รหัสแหล่งข้อมูล'
        - name: schema
          in: path
          required: true
          schema:
            type: string
          description: 'EN: Schema name / TH: ชื่อ schema'
        - name: table
          in: path
          required: true
          schema:
            type: string
          description: 'EN: Table name / TH: ชื่อตาราง'
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: 'EN: Row key value / TH: ค่า key ของแถว'
