        - schema
        - table_name
    Columns:
      type: object
      properties:
        id:
          type: string
          format: uuid
          nullable: true
          description: 'EN: Column ID / TH: รหัสคอลัมน์'
        sources_id:
          type: string
          format: uuid
          nullable: true
          description: 'EN: Source ID / TH: รหัสแหล่งข้อมูล'
        schema:
          type: string
          description: 'EN: Schema name / TH: ชื่อ schema'
        table_name:
          type: string
          description: 'EN: Table name / TH: ชื่อตาราง'
        column_name:
          type: string
          description: 'EN: Column name / TH: ชื่อคอลัมน์'
        data_type:
          type: string
          description: 'EN: Data type / TH: ชนิดข้อมูล'
        is_nullable:
          type: boolean
          description: 'EN: Whether the column is nullable / TH: ระบุว่าคอลัมน์เป็น null ได้หรือไม่'
        column_default:
          type: string
          nullable: true
          description: 'EN: Default value / TH: ค่า default'
        ordinal_position:
          type: integer
          nullable: true
          description: 'EN: Column position in table / TH: ลำดับคอลัมน์ในตาราง'
        created_at:
          type: string
          format: date-time
          nullable: true
          description: 'EN: Creation timestamp / TH: เวลาที่สร้างข้อมูล'
      required:
        - schema
        - table_name
        - column_name
        - data_type
        - is_nullable
    Dataset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          type: string
        owner:
          type: string
        sensitivity:
          type: string
          enum:
            - public
            - internal
            - confidential
            - restricted
        has_pii:
          type: boolean
        latest_version:
          type: string
        tags:
          type: array
          items:
            type: string
        description:
          type: string
    DatasetUpsert:
      type: object
      required:
        - id
        - name
        - domain
        - owner
        - sensitivity
        - has_pii
        - tags
        - description
      properties:
        id:
          type: string
          example: mydata
        name:
          type: string
        domain:
          type: string
        owner:
          type: string
        sensitivity:
          type: string
        has_pii:
          type: boolean
        tags:
          type: array
          items:
            type: string
        description:
          type: string
    Success:
      type: object
      properties:
        message:
          type: string
          example: success
    DatasetDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          type: string
        owner:
          type: string
        sensitivity:
          type: string
          enum:
            - public
            - internal
            - confidential
            - restricted
        has_pii:
          type: boolean
        latest_version:
          type: string
        tags:
          type: array
          items:
            type: string
        description:
          type: string
    Schema:
      type: object
      properties:
        columns:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: 'EN: Column name / TH: ชื่อคอลัมน์'
              table_name:
                type: string
                description: 'EN: Table name / TH: ชื่อตาราง'
              alias:
                type: string
                description: 'EN: Column alias (optional) / TH: alias ของคอลัมน์ (ไม่บังคับ)'
              type:
                type: string
                description: 'EN: Data type / TH: ชนิดข้อมูล'
              is_nullable:
                type: boolean
                description: 'EN: Whether the column is nullable / TH: ระบุว่าคอลัมน์เป็น null ได้หรือไม่'
              default:
                type: string
                nullable: true
                description: 'EN: Default value (optional) / TH: ค่า default (ไม่บังคับ)'
              enum:
                type: array
                items:
                  type: string
                description: 'EN: Enum values (optional) / TH: ค่า enum (ไม่บังคับ)'
            required:
              - name
              - table_name
              - type
          minItems: 1
          description: 'EN: Column definitions / TH: รายละเอียดคอลัมน์'
      required:
        - columns
    AccessPolicy:
      type: object
      properties:
        role:
          type: string
          description: 'EN: User role / TH: role ของผู้ใช้'
        scope:
          type: string
          description: 'EN: Access scope / TH: scope การเข้าถึง'
        can_view:
          type: boolean
          description: 'EN: View permission / TH: สิทธิ์ดูข้อมูล'
        can_edit:
          type: boolean
          description: 'EN: Edit permission / TH: สิทธิ์แก้ไขข้อมูล'
        can_delete:
          type: boolean
          description: 'EN: Delete permission / TH: สิทธิ์ลบข้อมูล'
        allow_view:
          type: array
          items:
            type: string
          minItems: 1
          description: 'EN: Allowed views/columns / TH: view หรือคอลัมน์ที่อนุญาต'
      required:
        - role
        - scope
        - allow_view
    FromRef:
      type: object
      required:
        - source
        - schema
        - table
      properties:
        source:
          type: string
        schema:
          type: string
        table:
          type: string
        alias:
          type: string
    Expr:
      type: object
      description: 'EN: Column reference or function call / TH: การอ้างอิงคอลัมน์หรือการเรียก function'
      properties:
        col:
          type: string
          description: 'EN: alias.column / TH: รูปแบบ alias.column'
        func:
          type: string
          enum:
            - max
            - min
            - sum
            - avg
            - count
            - coalesce
            - upper
            - lower
            - date_trunc
        args:
          type: array
          items:
            $ref: '#/components/schemas/Expr'
    BoolExpr:
      type: object
      description: 'EN: Boolean expression for joins/where (eq/and/or only) / TH: expression แบบ boolean สำหรับ join/where (รองรับเฉพาะ eq/and/or)'
      properties:
        eq:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: '#/components/schemas/Expr'
        and:
          type: array
          items:
            $ref: '#/components/schemas/BoolExpr'
        or:
          type: array
          items:
            $ref: '#/components/schemas/BoolExpr'
    JoinRef:
      type: object
      required:
        - type
        - source
        - schema
        - table
        - 'on'
      properties:
        type:
          type: string
          enum:
            - inner
            - left
        source:
          type: string
        schema:
          type: string
        table:
          type: string
        alias:
          type: string
        'on':
          $ref: '#/components/schemas/BoolExpr'
    Projection:
      type: object
      required:
        - as
        - expr
      properties:
        as:
          type: string
        expr:
          $ref: '#/components/schemas/Expr'
        type:
          type: string
        nullable:
          type: boolean
    WhereAllow:
      type: object
      required:
        - key
        - expr
      properties:
        key:
          type: string
        expr:
          $ref: '#/components/schemas/Expr'
        ops:
          type: array
          items:
            type: string
            enum:
              - '='
              - IN
              - '>'
              - <
              - '>='
              - <=
    OrderAllow:
      type: object
      properties:
        col:
          type: string
    QueryPlan:
      type: object
      properties:
        from:
          $ref: '#/components/schemas/FromRef'
        joins:
          type: array
          items:
            $ref: '#/components/schemas/JoinRef'
        projections:
          type: array
          items:
            $ref: '#/components/schemas/Projection'
        group_by:
          type: array
          items:
            $ref: '#/components/schemas/Expr'
        where_allow:
          type: array
          items:
            $ref: '#/components/schemas/WhereAllow'
        order_allow:
          type: array
          items:
            $ref: '#/components/schemas/OrderAllow'
        limit_default:
          type: integer
          minimum: 1
    OwnerColumn:
      type: object
      description: 'EN: Column used for owner-based row filtering. When set, queries include WHERE {owner_column} = {token_claim_value}. / TH: คอลัมน์ที่ใช้กรองข้อมูลตาม owner โดย query จะบังคับเงื่อนไข WHERE {owner_column} = {token_claim_value}'
      required:
        - table_name
        - column
        - alias
      properties:
        table_name:
          type: string
          description: 'EN: The table that contains the owner column / TH: ตารางที่มีคอลัมน์ owner'
        column:
          type: string
          description: 'EN: The column name in the table / TH: ชื่อคอลัมน์ในตาราง'
        alias:
          type: string
          description: 'EN: Alias for the column (must match a projection alias) / TH: alias ของคอลัมน์ (ต้องตรงกับ projection alias)'
    Policies:
      type: object
      properties:
        runtime:
          type: object
          properties:
            default_view:
              type: string
              description: 'EN: Default view name / TH: ชื่อ view เริ่มต้น'
            key_field:
              type: string
              description: 'EN: Primary key field / TH: field ที่เป็น primary key'
            query:
              $ref: '#/components/schemas/QueryPlan'
            owner_column:
              $ref: '#/components/schemas/OwnerColumn'
            token_claim:
              type: string
              description: 'EN: JWT claim key whose value is used for owner filtering (e.g. sub, preferred_username). Required when owner_column is set. / TH: key ของ JWT claim ที่ใช้กรองข้อมูลตาม owner เช่น sub หรือ preferred_username และจำเป็นเมื่อกำหนด owner_column'
          required:
            - default_view
            - key_field
            - query
        views:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              properties:
                table_name:
                  type: string
                  description: 'EN: Table name / TH: ชื่อตาราง'
                columns:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  description: 'EN: Column names / TH: ชื่อคอลัมน์'
              required:
                - table_name
                - columns
          description: 'EN: View definitions / TH: รายละเอียด view'
        filters:
          type: array
          items:
            type: string
          description: 'EN: Available filters (optional) / TH: filter ที่ใช้งานได้ (ไม่บังคับ)'
        write:
          type: object
          properties:
            key_field:
              type: string
              description: 'EN: Key field for write operations / TH: field key สำหรับการเขียนข้อมูล'
            allow_edit:
              type: array
              items:
                type: string
              minItems: 1
              description: 'EN: Editable fields / TH: field ที่แก้ไขได้'
            query:
              $ref: '#/components/schemas/QueryPlan'
            owner_column:
              $ref: '#/components/schemas/OwnerColumn'
            token_claim:
              type: string
              description: 'EN: JWT claim key whose value is used for owner filtering on write. Required when owner_column is set. / TH: key ของ JWT claim ที่ใช้กรอง owner ตอนเขียนข้อมูล และจำเป็นเมื่อกำหนด owner_column'
          required:
            - key_field
            - allow_edit
            - query
          description: 'EN: Write policy (optional) / TH: policy สำหรับเขียนข้อมูล (ไม่บังคับ)'
        delete:
          type: object
          properties:
            key_field:
              type: string
              description: 'EN: Key field for delete operations / TH: field key สำหรับการลบข้อมูล'
            query:
              $ref: '#/components/schemas/QueryPlan'
            owner_column:
              $ref: '#/components/schemas/OwnerColumn'
            token_claim:
              type: string
              description: 'EN: JWT claim key whose value is used for owner filtering on delete. Required when owner_column is set. / TH: key ของ JWT claim ที่ใช้กรอง owner ตอนลบข้อมูล และจำเป็นเมื่อกำหนด owner_column'
          required:
            - key_field
            - query
          description: 'EN: Delete policy (optional) / TH: policy สำหรับลบข้อมูล (ไม่บังคับ)'
      required:
        - views
    DatasetVersion:
