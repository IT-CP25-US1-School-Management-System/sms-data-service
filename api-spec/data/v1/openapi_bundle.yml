openapi: 3.0.3
info:
  title: Data Management Service (DMS) API — v1 (query-only)
  version: 1 .0.0
  description: |
    Central DMS focused on Catalog, Introspection, Contracts
    Serving (dynamic datasets + CRUD/Query/Export).
servers:
  - url: https://dms.company.com/api/v1
    description: Production
  - url: http://localhost:3200/api/v1
    description: Local Dev
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Introspection
  - name: Catalog
  - name: Contracts
  - name: Serving
  - name: Reporting
paths:
  /health:
    get:
      tags:
        - Health
      summary: Health probe
      responses:
        '200':
          description: OK
  /introspect/sources:
    get:
      tags:
        - Introspection
      summary: List registered physical sources
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: List of sources with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SourcesResponseDTO'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Introspection
      summary: Create a new data source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourcesDTO'
      responses:
        '200':
          description: Source created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
                  id:
                    type: string
                    format: uuid
                    description: Created source ID
        '400':
          description: Bad Request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - source already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/sources/{id}:
    put:
      tags:
        - Introspection
      summary: Update a data source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Source ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSourcesDTO'
      responses:
        '200':
          description: Source updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
                  id:
                    type: string
                    format: uuid
                    description: Updated source ID
        '400':
          description: Bad Request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Source not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Introspection
      summary: Delete a data source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Source ID
      responses:
        '200':
          description: Source deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
        '400':
          description: Bad Request - invalid ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Source not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - Introspection
      summary: Activate or deactivate a data source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Source ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_active:
                  type: boolean
                  description: Set to true to activate, false to deactivate
              required:
                - is_active
      responses:
        '200':
          description: Source status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
        '400':
          description: Bad Request - invalid ID or request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Source not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/schemas:
    get:
      tags:
        - Introspection
      summary: List schemas in a source
      parameters:
        - name: source_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by source ID
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: List of schemas with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Schemas'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/tables:
    get:
      tags:
        - Introspection
      summary: List tables in a schema
      parameters:
        - name: source_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by source ID
        - name: schema
          in: query
          schema:
            type: string
          description: Filter by schema name
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: List of tables with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tables'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /introspect/columns:
    get:
      tags:
        - Introspection
      summary: List columns for a table
      parameters:
        - name: source_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by source ID
        - name: schema
          in: query
          schema:
            type: string
          description: Filter by schema name
        - name: table
          in: query
          schema:
            type: string
          description: Filter by table name
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: List of columns with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Columns'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /datasets:
    get:
      tags:
        - Catalog
      summary: Search datasets
      parameters:
        - $ref: '#/components/parameters/SearchWord'
        - $ref: '#/components/parameters/Domain'
        - $ref: '#/components/parameters/Tag'
        - $ref: '#/components/parameters/HasPII'
        - $ref: '#/components/parameters/Owner'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: List of datasets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dataset'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: BadRequest,
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: InternalServerError,
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Catalog
      summary: New dataset and Update dataset
      requestBody:
        required: true
        description: dataset id must contain only lowercase english letters, underscore, and hyphen without spaces
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetUpsert'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: BadRequest,
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: InternalServerError,
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /datasets/{id}:
    get:
      tags:
        - Catalog
      summary: Get dataset detail
      parameters:
        - $ref: '#/components/parameters/DatasetId'
      responses:
        '200':
          description: Dataset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetDetail'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Catalog
      summary: Delete dataset by id
      parameters:
        - $ref: '#/components/parameters/DatasetId'
      responses:
        '200':
          description: Dataset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /datasets/{id}/versions:
    get:
      tags:
        - Contracts
      summary: Get list of dataset versions (contracts)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
        - name: source_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by source ID
        - name: search_word
          in: query
          schema:
            type: string
          description: Search term
        - name: status
          in: query
          schema:
            type: string
            enum:
              - active
              - preview
              - deprecated
          description: Filter by status
      responses:
        '200':
          description: List of dataset versions with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DatasetVersion'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Contracts
      summary: Create a new dataset version (contract)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsertDatasetVersionDTO'
      responses:
        '200':
          description: Dataset version created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
        '400':
          description: Bad Request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Dataset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Version already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /datasets/{id}/versions/{version}:
    get:
      tags:
        - Contracts
      summary: Get dataset version by ID (contract details)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Version name/number
      responses:
        '200':
          description: Dataset version details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DatasetVersion'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Dataset or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Contracts
      summary: Update dataset version (contract)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Version name/number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDatasetVersionDTO'
      responses:
        '200':
          description: Dataset version updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
        '400':
          description: Bad Request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Dataset or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - Contracts
      summary: Update dataset version status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Version name/number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDatasetVersionStatusDTO'
      responses:
        '200':
          description: Dataset version status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
        '400':
          description: Bad Request - validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Dataset or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /datasets/{id}/versions/{version}/data:
    get:
      tags:
        - Serving
      summary: List rows from a dataset version (policy-aware, dynamic)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Dataset version
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
        - name: view
          in: query
          schema:
            type: string
          description: View name to use for data access
        - name: where
          in: query
          schema:
            type: string
          description: JSON string for filter conditions (array of filter groups)
        - name: where_logical_operator
          in: query
          schema:
            type: string
            enum:
              - AND
              - OR
              - and
              - or
            default: AND
          description: Logical operator between filter groups
        - name: sort_by
          in: query
          schema:
            type: string
          description: Column name to sort by
        - name: sort_order
          in: query
          schema:
            type: string
            enum:
              - ASC
              - DESC
              - asc
              - desc
            default: ASC
          description: Sort order
      responses:
        '200':
          description: Dataset rows with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  page:
                    type: integer
                  per_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_rows:
                    type: integer
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Dataset or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Serving
      summary: Create a new row in dataset version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Dataset version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Row data to be created
      responses:
        '201':
          description: Row created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    additionalProperties: true
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Dataset or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - duplicate key or constraint violation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /datasets/{id}/versions/{version}/data/key/{key}:
    get:
      tags:
        - Serving
      summary: Get a row by key from dataset version (policy-aware)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Dataset version
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Row key
        - name: view
          in: query
          schema:
            type: string
          description: View name to use for data access
      responses:
        '200':
          description: Row data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Row, dataset, or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Serving
      summary: Update a row by key (replace all fields)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: Dataset version
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Row key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Complete row data for replacement
      responses:
        '200':
          description: Row updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    additionalProperties: true
        '400':
          description: Bad Request
          content:
