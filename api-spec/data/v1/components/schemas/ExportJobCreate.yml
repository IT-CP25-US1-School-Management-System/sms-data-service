type: object
properties:
  dataset_id:
    type: string
    description: "EN: Dataset ID / TH: รหัส dataset"
  view:
    type: string
    description: "EN: Optional dataset view / TH: view ของ dataset (ไม่บังคับ)"
  format:
    type: string
    enum: [csv, xlsx]
    description: "EN: Export file format / TH: รูปแบบไฟล์ export"
  version:
    type: string
    description: "EN: Dataset version / TH: version ของ dataset"
required:
  - dataset_id
  - format
  - version
