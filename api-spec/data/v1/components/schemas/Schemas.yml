    type: string
    format: uuid
    nullable: true
    description: "EN: Schema ID / TH: รหัส schema"
  sources_id:
    type: string
    format: uuid
    nullable: true
    description: "EN: Source ID / TH: รหัสแหล่งข้อมูล"
  schema:
    type: string
