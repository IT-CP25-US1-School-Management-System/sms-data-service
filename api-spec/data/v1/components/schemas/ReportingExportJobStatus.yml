type: object
properties:
  job_id:
    type: string
    format: uuid
  reporting_template_id:
    type: string
    format: uuid
  resource_id:
    type: string
  status:
    type: string
    enum: [pending, in_progress, completed, failed]
  original_filename:
    type: string
  file_size:
    type: integer
    format: int64
  created_at:
    type: string
    format: date-time
  completed_at:
    type: string
    format: date-time
    nullable: true
  error_message:
    type: string
    nullable: true
