type: object
properties:
  source_id:
    type: string
    format: uuid
    description: Source ID (UUID)
  status:
    type: string
    enum: [active, preview, deprecated]
    description: Version status
  schema:
    $ref: "Schema.yml"
  access_policies:
    type: array
    items:
      $ref: "AccessPolicy.yml"
    minItems: 1
    description: Access policies for this version
  policies:
    $ref: "Policies.yml"
required:
  - source_id
  - status
  - schema
  - access_policies
  - policies
