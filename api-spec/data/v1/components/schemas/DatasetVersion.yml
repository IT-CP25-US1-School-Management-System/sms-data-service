type: object
properties:
  dataset_id:
    type: string
    description: "EN: Parent dataset ID / TH: รหัส dataset หลัก"
  version:
    type: string
    description: "EN: Version name/number / TH: ชื่อหรือเลข version"
  source_id:
    type: string
    format: uuid
    nullable: true
    description: "EN: Source ID (UUID) / TH: รหัสแหล่งข้อมูล (UUID)"
  status:
    type: string
    enum: [active, preview, deprecated]
    description: "EN: Version status / TH: สถานะของ version"
  schema:
    $ref: "Schema.yml"
  access_policies:
    type: array
    items:
      $ref: "AccessPolicy.yml"
    description: "EN: Access policies for this version / TH: policy การเข้าถึงสำหรับ version นี้"
  policies:
    $ref: "Policies.yml"
  created_at:
    type: string
    format: date-time
    nullable: true
    description: "EN: Creation timestamp / TH: เวลาที่สร้างข้อมูล"
  updated_at:
    type: string
    format: date-time
    nullable: true
    description: "EN: Last update timestamp / TH: เวลาที่แก้ไขข้อมูลล่าสุด"
required:
  - dataset_id
  - version
  - status
  - schema
  - access_policies
  - policies
