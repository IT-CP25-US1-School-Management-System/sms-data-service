type: object
properties:
  name:
    type: string
    description: "EN: Source name (optional) / TH: ชื่อแหล่งข้อมูล (ไม่บังคับ)"
  description:
    type: string
    nullable: true
    description: "EN: Source description (optional) / TH: รายละเอียดแหล่งข้อมูล (ไม่บังคับ)"
  type:
    type: string
    enum: [jdbc]
    description: "EN: Source type (optional) / TH: ประเภทแหล่งข้อมูล (ไม่บังคับ)"
  is_active:
    type: boolean
    description: "EN: Whether the source is active (optional) / TH: ระบุว่าแหล่งข้อมูลเปิดใช้งานอยู่หรือไม่ (ไม่บังคับ)"
  sensitivity:
    type: string
    enum: [public, internal, confidential, restricted]
    description: "EN: Data sensitivity level (optional) / TH: ระดับความอ่อนไหวของข้อมูล (ไม่บังคับ)"
  db_type:
    type: string
    enum: [postgres, mysql]
    description: "EN: Database type (optional) / TH: ประเภทฐานข้อมูล (ไม่บังคับ)"
  host:
    type: string
    description: "EN: Database host (optional) / TH: host ของฐานข้อมูล (ไม่บังคับ)"
  port:
    type: integer
    minimum: 1
    description: "EN: Database port (optional) / TH: port ของฐานข้อมูล (ไม่บังคับ)"
  username:
    type: string
    description: "EN: Database username (optional) / TH: username ของฐานข้อมูล (ไม่บังคับ)"
  database_name:
    type: string
    description: "EN: Database name (optional) / TH: ชื่อฐานข้อมูล (ไม่บังคับ)"
  params:
    type: string
    nullable: true
    description: "EN: Additional connection parameters (optional) / TH: parameter เพิ่มเติมสำหรับการเชื่อมต่อ (ไม่บังคับ)"
  is_update_password:
    type: boolean
    description: "EN: Whether to update the password (optional) / TH: ระบุว่าต้องการอัปเดต password หรือไม่ (ไม่บังคับ)"
  password:
    type: string
    description: "EN: Database password (optional, required if is_update_password is true) / TH: password ของฐานข้อมูล (ไม่บังคับ แต่จำเป็นเมื่อ is_update_password เป็น true)"
