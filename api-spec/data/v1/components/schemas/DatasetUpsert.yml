type: object
required:
  - id
  - name
  - domain
  - owner
  - sensitivity
  - has_pii
  - tags
  - description
properties:
  id:
    type: string
    example: "mydata"
  name:
    type: string
  domain:
    type: string
  owner:
    type: string
  sensitivity:
    type: string
  has_pii:
    type: boolean
  tags:
    type: array
    items:
      type: string
  description:
    type: string
