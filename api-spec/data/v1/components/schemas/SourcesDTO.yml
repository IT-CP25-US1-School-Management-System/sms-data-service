type: object
properties:
  name:
    type: string
    description: "EN: Source name / TH: ชื่อแหล่งข้อมูล"
  description:
    type: string
    nullable: true
    description: "EN: Source description (optional) / TH: รายละเอียดแหล่งข้อมูล (ไม่บังคับ)"
  type:
    type: string
    enum: [jdbc]
    description: "EN: Source type / TH: ประเภทแหล่งข้อมูล"
  is_active:
    type: boolean
    description: "EN: Whether the source is active / TH: ระบุว่าแหล่งข้อมูลเปิดใช้งานอยู่หรือไม่"
  sensitivity:
    type: string
    enum: [public, internal, confidential, restricted]
    description: "EN: Data sensitivity level / TH: ระดับความอ่อนไหวของข้อมูล"
  db_type:
    type: string
    enum: [postgres, mysql]
    description: "EN: Database type / TH: ประเภทฐานข้อมูล"
  host:
    type: string
    description: "EN: Database host / TH: host ของฐานข้อมูล"
  port:
    type: integer
    minimum: 1
    description: "EN: Database port / TH: port ของฐานข้อมูล"
  username:
    type: string
    description: "EN: Database username / TH: username ของฐานข้อมูล"
  password:
    type: string
    description: "EN: Database password / TH: password ของฐานข้อมูล"
  database_name:
    type: string
    description: "EN: Database name / TH: ชื่อฐานข้อมูล"
  params:
    type: string
    nullable: true
    description: "EN: Additional connection parameters (optional) / TH: parameter เพิ่มเติมสำหรับการเชื่อมต่อ (ไม่บังคับ)"
required:
  - name
  - type
  - is_active
  - sensitivity
  - db_type
  - host
  - port
  - username
  - password
  - database_name
