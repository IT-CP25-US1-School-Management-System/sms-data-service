type: object
description: "EN: Runtime serving configuration (query plan only) / TH: configuration สำหรับ serving ตอน runtime (เฉพาะ query plan)"
required:
  - key
  - default_view
  - query
properties:
  key:
    type: string
  default_view:
    type: string
  query:
    $ref: "./QueryPlan.yml"
  owner_column:
    $ref: "./OwnerColumn.yml"
  token_claim:
    type: string
    description: "EN: JWT claim key whose value is used for owner-based row filtering. Required when owner_column is set. / TH: key ของ JWT claim ที่ใช้กรองข้อมูลตาม owner และจำเป็นเมื่อกำหนด owner_column"
