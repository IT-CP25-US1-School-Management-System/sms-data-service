type: object
properties:
  id:
    type: string
    format: uuid
    nullable: true
    description: Source ID
  name:
    type: string
    description: Source name
  description:
    type: string
    nullable: true
    description: Source description
  type:
    type: string
    description: Source type
  is_active:
    type: boolean
    description: Whether the source is active
  sensitivity:
    type: string
    description: Data sensitivity level
  db_type:
    type: string
    description: Database type
  host:
    type: string
    description: Database host
  port:
    type: integer
    description: Database port
  username:
    type: string
    description: Database username
  database_name:
    type: string
    description: Database name
  params:
    type: string
    nullable: true
    description: Additional connection parameters
  created_at:
    type: string
    format: date-time
    nullable: true
    description: Creation timestamp
  updated_at:
    type: string
    format: date-time
    nullable: true
    description: Last update timestamp
required:
  - name
  - type
  - is_active
  - sensitivity
  - db_type
  - host
  - port
  - username
  - database_name