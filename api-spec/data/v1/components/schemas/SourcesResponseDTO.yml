type: object
properties:
  id:
    type: string
    format: uuid
    nullable: true
    description: "EN: Source ID / TH: รหัสแหล่งข้อมูล"
  name:
    type: string
    description: "EN: Source name / TH: ชื่อแหล่งข้อมูล"
  description:
    type: string
    nullable: true
    description: "EN: Source description / TH: รายละเอียดแหล่งข้อมูล"
  type:
    type: string
    description: "EN: Source type / TH: ประเภทแหล่งข้อมูล"
  is_active:
    type: boolean
    description: "EN: Whether the source is active / TH: ระบุว่าแหล่งข้อมูลเปิดใช้งานอยู่หรือไม่"
  sensitivity:
    type: string
    description: "EN: Data sensitivity level / TH: ระดับความอ่อนไหวของข้อมูล"
  db_type:
    type: string
    description: "EN: Database type / TH: ประเภทฐานข้อมูล"
  host:
    type: string
    description: "EN: Database host / TH: host ของฐานข้อมูล"
  port:
    type: integer
    description: "EN: Database port / TH: port ของฐานข้อมูล"
  username:
    type: string
    description: "EN: Database username / TH: username ของฐานข้อมูล"
  database_name:
    type: string
    description: "EN: Database name / TH: ชื่อฐานข้อมูล"
  params:
    type: string
    nullable: true
    description: "EN: Additional connection parameters / TH: parameter เพิ่มเติมสำหรับการเชื่อมต่อ"
  created_at:
    type: string
    format: date-time
    nullable: true
    description: "EN: Creation timestamp / TH: เวลาที่สร้างข้อมูล"
  updated_at:
    type: string
    format: date-time
    nullable: true
    description: "EN: Last update timestamp / TH: เวลาที่แก้ไขข้อมูลล่าสุด"
required:
  - name
  - type
  - is_active
  - sensitivity
  - db_type
  - host
  - port
  - username
  - database_name
