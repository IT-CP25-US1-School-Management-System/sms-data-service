syntax = "proto3";
option go_package = "./proto_models";
package proto;

message FileRequest {
  string path = 1;
  string folder = 2;
  string original_filename = 3;
  bool is_generate_filename = 4;
  bytes body = 5;
}

message FileResponse {
  string url = 1;
  string object_name = 2;
  string content_type = 3;
  string extension = 4;
  int64 size = 5;
  string original_filename = 6;
  string storage_filename = 7;
}

message GetFileByResourceIDRequest {
  string resource_id = 1;
}

service Document {
  rpc UploadFile(stream FileRequest) returns (FileResponse) {}
  rpc GetFileByResourceID(GetFileByResourceIDRequest) returns (FileResponse) {}
}

